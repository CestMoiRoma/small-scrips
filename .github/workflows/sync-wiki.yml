name: Sync Docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "small-doc/**"
      - "ROADMAP.md"
      - "token-calculator/token_calculator.md"
      - "apple-tts2mp3/apple-TTS2MP3.md"
      - "get-macos-pos/Get-MacOS-Pos.md"
      - "ollama-bulk-pull/ollama_bulk_pull.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            _wiki

      - name: Wipe wiki content
        run: |
          git -C _wiki rm -rf . --quiet
          git -C _wiki clean -fd

      - name: Copy docs into wiki
        run: |
          mkdir -p _wiki/scripts

          # Landing page
          cp wiki/home.md _wiki/Home.md

          # Roadmap
          cp ROADMAP.md _wiki/Roadmap.md

          # Small-doc sections (git/, linux/, docker/, …)
          cp -r small-doc/. _wiki/

          # Small-doc index (after small-doc copy so it can't be overwritten)
          cp wiki/Small_Doc_Index.md _wiki/index.md

          # Scripts index
          cp wiki/Small_Scripts_index.md _wiki/scripts/index.md

          # Script docs
          cp token-calculator/token_calculator.md _wiki/scripts/token-calculator.md
          cp apple-tts2mp3/apple-TTS2MP3.md       _wiki/scripts/apple-tts2mp3.md
          cp get-macos-pos/Get-MacOS-Pos.md        _wiki/scripts/get-macos-pos.md
          cp ollama-bulk-pull/ollama_bulk_pull.md  _wiki/scripts/ollama-bulk-pull.md

      - name: Generate _Sidebar.md
        run: |
          python3 << 'EOF'
          import os

          lines = [
              "## 📦 Scripts\n",
              "\n",
              "- [Index](scripts/index)\n",
              "- [Token Calculator](scripts/token-calculator)\n",
              "- [Apple TTS → MP3](scripts/apple-tts2mp3)\n",
              "- [Get macOS Position](scripts/get-macos-pos)\n",
              "- [Ollama Bulk Pull](scripts/ollama-bulk-pull)\n",
              "\n",
              "---\n",
              "\n",
              "## 📝 Small Doc\n",
              "\n",
              "- [Index](index)\n",
              "\n",
          ]

          sections = {
              "Git":                  "git",
              "Linux":                "linux",
              "Docker":               "docker",
              "Python & pip":         "python",
              "Homebrew":             "homebrew",
              "Chocolatey":           "chocolatey",
              "Windows CMD":          "windows-cmd",
              "PowerShell":           "powershell",
              "Conventional Commits": "conventional-commits",
          }

          page_labels = {
              "cheatsheet":                     "Cheat Sheet",
              "basics":                         "Basics",
              "advanced":                       "Advanced",
              "flags":                          "Flags",
              "conventional-commits":           "Types & descriptions",
              "conventional-commits-cheatsheet":"Cheat Sheet",
          }

          for section_name, folder in sections.items():
              folder_path = os.path.join("_wiki", folder)
              if not os.path.isdir(folder_path):
                  continue
              lines.append(f"**{section_name}**\n\n")
              for fname in sorted(os.listdir(folder_path)):
                  if not fname.endswith(".md"):
                      continue
                  slug = fname[:-3]
                  parts = slug.split("-")
                  key = "-".join(parts[1:]) if len(parts) > 1 and parts[0] == folder.split("-")[0] else slug
                  label = page_labels.get(key, key.replace("-", " ").title())
                  lines.append(f"- [{label}]({folder}/{slug})\n")
              lines.append("\n")

          lines += ["---\n", "\n", "- [🗺️ Roadmap](Roadmap)\n"]

          with open("_wiki/_Sidebar.md", "w") as f:
              f.writelines(lines)

          print("_Sidebar.md written.")
          EOF

      - name: Commit and push to wiki
        run: |
          cd _wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Nothing to update." && exit 0
          git commit -m "docs: sync from main @ $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
