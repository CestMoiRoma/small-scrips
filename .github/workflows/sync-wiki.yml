name: Sync Docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - "small-doc/**"
      - "wiki/**"
      - "ROADMAP.md"
      - "*/wiki.md"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Clone the wiki repo ────────────────────────────────────────────────
      - name: Clone wiki repository
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            _wiki

      # ── Copy files ─────────────────────────────────────────────────────────
      - name: Copy docs into wiki
        run: |
          # Wipe the entire wiki content (git-aware: leaves .git intact)
          git -C _wiki rm -rf . --quiet
          git -C _wiki clean -fd

          # Pre-create output directories
          mkdir -p _wiki/scripts

          # wiki/home.md → Home (the wiki landing page)
          cp wiki/home.md _wiki/Home.md

          # wiki/scripts.md → scripts.md (scripts index page)
          cp wiki/scripts.md _wiki/scripts.md

          # ROADMAP
          cp ROADMAP.md _wiki/Roadmap.md

          # small-doc tree (keeps subfolders: git/, linux/, docker/…)
          cp -r small-doc/. _wiki/

          # Script wiki pages: each <script>/wiki.md → scripts/<script-name>.md
          for dir in token-calculator apple-tts2mp3 get-macos-pos ollama-bulk-pull; do
            if [ -f "$dir/wiki.md" ]; then
              cp "$dir/wiki.md" "_wiki/scripts/$dir.md"
            fi
          done

      # ── Generate _Sidebar.md ───────────────────────────────────────────────
      - name: Generate sidebar
        run: |
          python3 << 'EOF'
          import os

          lines = []

          lines += [
              "## 📦 Scripts\n",
              "\n",
              "- [Scripts](scripts)\n",
              "- [Token Calculator](scripts/token-calculator)\n",
              "- [Apple TTS → MP3](scripts/apple-tts2mp3)\n",
              "- [Get macOS Position](scripts/get-macos-pos)\n",
              "- [Ollama Bulk Pull](scripts/ollama-bulk-pull)\n",
              "\n",
          ]

          sections = {
              "Git": "git",
              "Linux": "linux",
              "Docker": "docker",
              "Python & pip": "python",
              "Homebrew": "homebrew",
              "Chocolatey": "chocolatey",
              "Windows CMD": "windows-cmd",
              "PowerShell": "powershell",
              "Conventional Commits": "conventional-commits",
          }

          page_labels = {
              "cheatsheet":    "Cheat Sheet",
              "basics":        "Basics",
              "advanced":      "Advanced",
              "flags":         "Flags",
              "conventional-commits":            "Types & descriptions",
              "conventional-commits-cheatsheet": "Cheat Sheet",
          }

          lines += ["---\n\n## 📝 Small Doc\n\n- [Index](index)\n\n"]

          for section_name, folder in sections.items():
              folder_path = os.path.join("_wiki", folder)
              if not os.path.isdir(folder_path):
                  continue

              lines.append(f"**{section_name}**\n\n")
              for fname in sorted(os.listdir(folder_path)):
                  if not fname.endswith(".md"):
                      continue
                  slug = fname[:-3]
                  parts = slug.split("-")
                  if len(parts) > 1 and parts[0] == folder.split("-")[0]:
                      key = "-".join(parts[1:])
                  else:
                      key = slug
                  label = page_labels.get(key, key.replace("-", " ").title())
                  lines.append(f"- [{label}]({folder}/{slug})\n")
              lines.append("\n")

          lines += ["---\n\n- [🗺️ Roadmap](Roadmap)\n"]

          with open("_wiki/_Sidebar.md", "w") as f:
              f.writelines(lines)

          print("_Sidebar.md generated.")
          EOF

      # ── Commit and push ────────────────────────────────────────────────────
      - name: Commit and push to wiki
        run: |
          cd _wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Nothing to update." && exit 0
          git commit -m "docs: sync from main @ $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push