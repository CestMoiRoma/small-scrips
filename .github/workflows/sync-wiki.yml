name: Sync Docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "small-doc/**"
      - "ROADMAP.md"
      - "token-calculator/token_calculator.md"
      - "apple-tts2mp3/apple-TTS2MP3.md"
      - "get-macos-pos/Get-MacOS-Pos.md"
      - "ollama-bulk-pull/ollama_bulk_pull.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        run: |
          git clone \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git \
            _wiki

      - name: Wipe wiki content
        run: |
          git -C _wiki rm -rf . --quiet
          git -C _wiki clean -fd

      - name: Copy docs into wiki (flat)
        run: |
          # Landing page and indexes
          cp wiki/home.md                _wiki/Home.md
          cp wiki/Small_Scripts_index.md _wiki/Small_Scripts_index.md
          cp wiki/Small_Doc_Index.md     _wiki/Small_Doc_Index.md
          cp ROADMAP.md                  _wiki/Roadmap.md

          # Script docs (keep original filenames)
          cp token-calculator/token_calculator.md _wiki/token_calculator.md
          cp apple-tts2mp3/apple-TTS2MP3.md       _wiki/apple-TTS2MP3.md
          cp get-macos-pos/Get-MacOS-Pos.md        _wiki/Get-MacOS-Pos.md
          cp ollama-bulk-pull/ollama_bulk_pull.md  _wiki/ollama_bulk_pull.md

          # Small-doc pages — flatten: drop the subfolder, keep the filename
          find small-doc -name "*.md" -exec bash -c 'cp "$1" "_wiki/$(basename "$1")"' _ {} \;

      - name: Generate _Sidebar.md
        run: |
          python3 << 'EOF'
          import os

          lines = [
              "## 📦 Scripts\n",
              "\n",
              "- [Index](Small_Scripts_index)\n",
              "- [Token Calculator](token_calculator)\n",
              "- [Apple TTS → MP3](apple-TTS2MP3)\n",
              "- [Get macOS Position](Get-MacOS-Pos)\n",
              "- [Ollama Bulk Pull](ollama_bulk_pull)\n",
              "\n",
              "---\n",
              "\n",
              "## 📝 Small Doc\n",
              "\n",
              "- [Index](Small_Doc_Index)\n",
              "\n",
          ]

          sections = {
              "Git":                  "git",
              "Linux":                "linux",
              "Docker":               "docker",
              "Python & pip":         "python",
              "Homebrew":             "homebrew",
              "Chocolatey":           "chocolatey",
              "Windows CMD":          "windows-cmd",
              "PowerShell":           "powershell",
              "Conventional Commits": "conventional-commits",
          }

          # Maps folder name → actual filename prefix (only needed where they differ)
          folder_prefix = {
              "windows-cmd": "cmd",
          }

          page_labels = {
              "cheatsheet":                      "Cheat Sheet",
              "basics":                          "Basics",
              "advanced":                        "Advanced",
              "flags":                           "Flags",
              "conventional-commits":            "Types & descriptions",
              "conventional-commits-cheatsheet": "Cheat Sheet",
          }

          for section_name, folder in sections.items():
              folder_path = os.path.join("small-doc", folder)
              if not os.path.isdir(folder_path):
                  continue
              prefix = folder_prefix.get(folder, folder)
              lines.append(f"**{section_name}**\n\n")
              for fname in sorted(os.listdir(folder_path)):
                  if not fname.endswith(".md"):
                      continue
                  slug = fname[:-3]
                  key = slug[len(prefix) + 1:] if slug.startswith(prefix + "-") else slug
                  label = page_labels.get(key, key.replace("-", " ").title())
                  lines.append(f"- [{label}]({slug})\n")
              lines.append("\n")

          lines += ["---\n", "\n", "- [🗺️ Roadmap](Roadmap)\n"]

          with open("_wiki/_Sidebar.md", "w") as f:
              f.writelines(lines)

          print("_Sidebar.md written.")
          EOF

      - name: Commit and push to wiki
        run: |
          cd _wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "Nothing to update." && exit 0
          git commit -m "docs: sync from main @ $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
